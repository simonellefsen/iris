<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
	<defs>
		<linearGradient id="bgm" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#1e293b" />
			<stop offset="1" stop-color="#0f172a" />
		</linearGradient>
		<linearGradient id="bladep" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#38bdf8" />
			<stop offset="1" stop-color="#6366f1" />
		</linearGradient>
	</defs>
	<!-- Full-bleed background (maskable: platform may crop to a circle, icon stays within center ~80%) -->
	<rect width="512" height="512" fill="url(#bgm)" />
	<g transform="translate(256 256) scale(0.72)">
		<circle r="150" fill="none" stroke="#475569" stroke-width="14" />
		<g fill="url(#bladep)">
			<polygon points="0,-128 74,-43 -74,-43" transform="rotate(0)" opacity="0.95" />
			<polygon points="0,-128 74,-43 -74,-43" transform="rotate(60)" opacity="0.8" />
			<polygon points="0,-128 74,-43 -74,-43" transform="rotate(120)" opacity="0.7" />
			<polygon points="0,-128 74,-43 -74,-43" transform="rotate(180)" opacity="0.95" />
			<polygon points="0,-128 74,-43 -74,-43" transform="rotate(240)" opacity="0.8" />
			<polygon points="0,-128 74,-43 -74,-43" transform="rotate(300)" opacity="0.7" />
		</g>
		<circle r="26" fill="#0f172a" stroke="#38bdf8" stroke-width="8" />
	</g>
</svg>
